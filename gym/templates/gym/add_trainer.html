{% extends 'gym/base.html' %}

{% block content %}
<div class="page-header">
    <div>
        <h1>➕ Add New Trainer</h1>
        <p style="color:var(--text-muted);">Fill in the details to register a new coach in the database.</p>
    </div>
    <a href="{% url 'trainers' %}" class="btn btn-outline">← Back to Trainers</a>
</div>

<div class="card" style="max-width: 640px; margin: 0 auto; animation-delay: 0.1s;">
    <form method="POST" style="display:flex; flex-direction:column; gap:0;">
        {% csrf_token %}

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.25rem;">
            <div class="form-group">
                <label class="form-label">Full Name *</label>
                <input type="text" name="name" class="form-input" placeholder="e.g. Rahul Sharma" value="{{ form_data.name }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Specialty *</label>
                <input type="text" name="specialty" class="form-input" placeholder="e.g. Strength Training" value="{{ form_data.specialty }}" required>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.25rem;">
            <div class="form-group">
                <label class="form-label">Phone Number *</label>
                <input type="text" name="phone" class="form-input" placeholder="+91 98765 43210" value="{{ form_data.phone }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Experience (Years) *</label>
                <input type="number" name="experience_years" class="form-input" min="1" max="50" value="{{ form_data.experience_years|default:3 }}" required>
            </div>
        </div>

        <div class="form-group" style="margin-bottom:1.5rem;">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-input" placeholder="trainer@elitegym.com" value="{{ form_data.email }}">
        </div>

        <button type="submit" class="btn" style="width:100%; padding:1rem; font-size:1rem;">
            💾 Save Trainer to Database
        </button>
    </form>
</div>
{% endblock %}
