{% extends 'gym/base.html' %}

{% block content %}
<div class="page-header">
    <div>
        <h1>👤 Register New Member</h1>
        <p style="color:var(--text-muted);">Enroll a new user into the gym database.</p>
    </div>
    <a href="{% url 'members' %}" class="btn btn-outline">← Back to Members</a>
</div>

<div class="card" style="max-width:640px; margin:0 auto; animation-delay:0.1s;">
    <form method="POST" style="display:flex; flex-direction:column; gap:0;">
        {% csrf_token %}

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.25rem;">
            <div class="form-group">
                <label class="form-label">First Name *</label>
                <input type="text" name="first_name" class="form-input" placeholder="e.g. Aarav" required>
            </div>
            <div class="form-group">
                <label class="form-label">Last Name *</label>
                <input type="text" name="last_name" class="form-input" placeholder="e.g. Sharma" required>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.25rem;">
            <div class="form-group">
                <label class="form-label">Email Address *</label>
                <input type="email" name="email" class="form-input" placeholder="member@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone" class="form-input" placeholder="+91 98765 43210">
            </div>
        </div>

        <div class="form-group" style="margin-bottom:1.25rem;">
            <label class="form-label">Gender *</label>
            <select name="gender" class="form-input">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group" style="margin-bottom:1.25rem;">
            <label class="form-label">Membership Plan *</label>
            <select name="plan" class="form-input">
                <option value="">-- Select a Plan --</option>
                {% for plan in plans %}
                <option value="{{ plan.id }}">{{ plan.name }} — ₹{{ plan.price }} / {{ plan.duration_months }} month{{ plan.duration_months|pluralize }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group" style="margin-bottom:1.75rem;">
            <label class="form-label">Assign Trainer (Optional)</label>
            <select name="trainer" class="form-input">
                <option value="">-- No Trainer --</option>
                {% for trainer in trainers %}
                <option value="{{ trainer.id }}">{{ trainer.name }} — {{ trainer.specialty }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn" style="width:100%; padding:1rem; font-size:1rem;">
            💾 Register Member in Database
        </button>
    </form>
</div>
{% endblock %}
