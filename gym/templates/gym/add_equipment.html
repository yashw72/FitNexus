{% extends 'gym/base.html' %}

{% block content %}
<div class="page-header">
    <div>
        <h1>➕ Add Equipment</h1>
        <p style="color:var(--text-muted);">Register new equipment into the database inventory.</p>
    </div>
    <a href="{% url 'equipment' %}" class="btn btn-outline">← Back to Equipment</a>
</div>

<div class="card" style="max-width:680px; margin:0 auto; animation-delay:0.1s;">
    <form method="POST" style="display:flex; flex-direction:column; gap:0;">
        {% csrf_token %}

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.25rem;">
            <div class="form-group">
                <label class="form-label">Equipment Name *</label>
                <input type="text" name="name" class="form-input" placeholder="e.g. Treadmill Pro X1" required>
            </div>
            <div class="form-group">
                <label class="form-label">Equipment Type *</label>
                <input type="text" name="equipment_type" class="form-input" placeholder="e.g. Cardio" required list="types-list">
                <datalist id="types-list">
                    <option value="Cardio">
                    <option value="Strength">
                    <option value="Free Weights">
                    <option value="Functional">
                    <option value="Flexibility">
                    <option value="Recovery">
                </datalist>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.25rem;">
            <div class="form-group">
                <label class="form-label">Status *</label>
                <select name="status" class="form-input">
                    <option value="Active">✅ Active</option>
                    <option value="Maintenance needed">⚠️ Maintenance needed</option>
                    <option value="Out of order">❌ Out of order</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Quantity *</label>
                <input type="number" name="quantity" class="form-input" min="1" value="1" required>
            </div>
        </div>

        <div class="form-group" style="margin-bottom:1.25rem;">
            <label class="form-label">Location / Zone</label>
            <input type="text" name="location" class="form-input" placeholder="e.g. Cardio Zone, Main Floor" list="locations-list">
            <datalist id="locations-list">
                <option value="Cardio Zone">
                <option value="Weights Room">
                <option value="Free Weights Area">
                <option value="Functional Zone">
                <option value="Yoga Studio">
                <option value="Recovery Zone">
                <option value="Main Floor">
            </datalist>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.75rem;">
            <div class="form-group">
                <label class="form-label">Purchase Date</label>
                <input type="date" name="purchase_date" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Next Maintenance Date</label>
                <input type="date" name="next_maintenance_date" class="form-input">
            </div>
        </div>

        <button type="submit" class="btn" style="width:100%; padding:1rem; font-size:1rem;">
            💾 Save Equipment to Database
        </button>
    </form>
</div>
{% endblock %}
