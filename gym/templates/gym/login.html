<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Elite Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f111a;
            --primary: #00ff88;
            --primary-hover: #00cc6a;
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --border: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(15, 17, 26, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0,255,136,0.06) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0,150,255,0.06) 0%, transparent 50%);
        }
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 1rem;
        }
        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeIn 0.5s ease;
        }
        .brand h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .brand h1 span { color: var(--primary); }
        .brand p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }
        .login-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            backdrop-filter: blur(12px);
            animation: fadeIn 0.6s ease backwards;
        }
        .login-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }
        .login-card p.sub {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            transition: border-color 0.3s;
            outline: none;
        }
        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 0.5rem;
        }
        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,255,136,0.3);
        }
        .alert {
            padding: 0.8rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .alert-error { background: rgba(255,77,109,0.12); border: 1px solid rgba(255,77,109,0.3); color: #ff6b8a; }
        .alert-success { background: rgba(0,255,136,0.12); border: 1px solid rgba(0,255,136,0.3); color: #00ff88; }
        .alert-info { background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3); color: #00e5ff; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="brand">
        <h1>Elite<span>Gym</span></h1>
        <p>Management System</p>
    </div>

    <div class="login-card">
        <h2>Welcome back 👋</h2>
        <p class="sub">Sign in to your admin account to continue</p>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input id="username" type="text" name="username" class="form-input"
                       placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input id="password" type="password" name="password" class="form-input"
                       placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">🔐 Sign In</button>
        </form>
    </div>

    <div class="login-footer">
        <p>© 2026 Elite Gym Management System — Final DBMS Project</p>
    </div>
</div>
</body>
</html>
