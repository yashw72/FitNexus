<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Elite Gym Management</meta>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f111a;
            --primary: #00ff88;
            --primary-hover: #00cc6a;
            --surface: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
            --text: #ffffff;
            --muted: #8892b0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(0,255,136,0.07) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0,150,255,0.07) 0%, transparent 50%);
        }
        .login-card {
            background: rgba(15,17,26,0.9);
            border: 1px solid rgba(0,255,136,0.15);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 40px rgba(0,255,136,0.05);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity:0; transform: translateY(30px); }
            to   { opacity:1; transform: translateY(0); }
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo h1 { font-size: 2rem; font-weight: 800; color: var(--text); }
        .logo h1 span { color: var(--primary); }
        .logo p { color: var(--muted); font-size: 0.9rem; margin-top: 0.4rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; color: var(--muted); font-size: 0.85rem; margin-bottom: 0.5rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type=text], input[type=password] {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.3s;
            outline: none;
        }
        input[type=text]:focus, input[type=password]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: var(--primary);
            color: #000;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
            letter-spacing: 0.5px;
        }
        .btn-login:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,255,136,0.35); }
        .messages { margin-bottom: 1.25rem; }
        .msg { padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .msg.error { background: rgba(255,77,109,0.15); border: 1px solid rgba(255,77,109,0.3); color: #ff6b8a; }
        .hint { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 1.5rem; }
        .hint strong { color: var(--primary); }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <h1>Elite<span>Gym</span></h1>
        <p>Management System — Sign In</p>
    </div>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="msg error">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" id="id_username" name="username" placeholder="Enter your username" required autofocus>
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" id="id_password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-login">🔐 Sign In</button>
    </form>

    <div class="hint">
        Admin access: use <strong>superuser</strong> credentials<br>
        <span style="font-size:0.75rem; margin-top:0.3rem; display:block;">Staff can manage trainers & equipment</span>
    </div>
</div>
</body>
</html>
